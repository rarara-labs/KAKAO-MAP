var STORAGE_KEY = '6월_4주_무선국_done';
var total = STATIONS.length;

var map = L.map('map').setView([34.93106, 128.08238], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors', maxZoom: 19
}).addTo(map);

function makeIcon(done) {
  var bg = done ? '#2e7d32' : '#b71c1c';
  var emoji = done ? '✅' : '📻';
  return L.divIcon({
    className: '',
    html: '<div style="background:' + bg + ';color:white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,0.4);border:2px solid white;">' + emoji + '</div>',
    iconSize:[28,28], iconAnchor:[14,14], popupAnchor:[0,-15]
  });
}

var doneSet = {};
try { doneSet = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) {}

function saveDone() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(doneSet)); } catch(e) {}
  updateProgress();
}

function updateProgress() {
  var cnt = Object.keys(doneSet).filter(function(k){ return doneSet[k]; }).length;
  document.getElementById('progress-badge').textContent = '완료 ' + cnt + '/' + total;
}

var markers = [];

STATIONS.forEach(function(s, idx) {
  var done = !!doneSet[idx];
  var m = L.marker([s.lat, s.lng], {icon: makeIcon(done)}).addTo(map);

  // 이름 항상 표시 (permanent tooltip)
  m.bindTooltip(s.name, {
    permanent: true,
    direction: 'top',
    offset: [0, -16],
    className: 'marker-label'
  });

  function buildPopup() {
    var isDone = !!doneSet[idx];
    var enc = encodeURIComponent(s.name);
    var navUrl = 'https://map.kakao.com/link/to/' + enc + ',' + s.lat + ',' + s.lng;
    var viewUrl = 'https://map.kakao.com/link/map/' + enc + ',' + s.lat + ',' + s.lng;
    var noteHtml = s.note
      ? '<div class="popup-note">📝 ' + s.note + '</div>'
      : '<div class="popup-note-empty">특이사항 없음</div>';
    var doneBtn = isDone
      ? '<button class="popup-btn btn-undone" onclick="toggleDone(' + idx + ')">↩️ 완료 취소</button>'
      : '<button class="popup-btn btn-done" onclick="toggleDone(' + idx + ')">✅ 완료</button>';
    return '<div class="popup-name">' + (isDone ? '✅ ' : '📻 ') + s.name + '</div>' +
      '<div class="popup-addr">📌 ' + s.origAddr + '</div>' +
      noteHtml +
      '<div class="popup-btns">' +
      '<a class="popup-btn btn-nav" href="' + navUrl + '" target="_blank">🚗 경로안내</a>' +
      '<a class="popup-btn btn-view" href="' + viewUrl + '" target="_blank">🗺️ 지도보기</a>' +
      '</div>' + doneBtn;
  }

  m.bindPopup(buildPopup, {maxWidth:280});
  markers.push({marker:m, station:s, visible:true, idx:idx});
});

window.toggleDone = function(idx) {
  doneSet[idx] = !doneSet[idx];
  saveDone();
  var e = markers[idx];
  e.marker.setIcon(makeIcon(!!doneSet[idx]));
  e.marker.openPopup();
  renderSideList(markers.filter(function(x){ return x.visible; }));
};

updateProgress();

function fitAll() {
  var v = markers.filter(function(e){ return e.visible; });
  if (!v.length) return;
  map.fitBounds(L.featureGroup(v.map(function(e){ return e.marker; })).getBounds().pad(0.1));
}
fitAll();

function filterMarkers(kw) {
  kw = kw.trim().toLowerCase();
  var shown = [];
  markers.forEach(function(e) {
    var m = !kw
      || e.station.name.toLowerCase().indexOf(kw)>=0
      || e.station.origAddr.toLowerCase().indexOf(kw)>=0
      || e.station.note.toLowerCase().indexOf(kw)>=0;
    e.visible = m;
    if (m) { e.marker.addTo(map); shown.push(e); } else map.removeLayer(e.marker);
  });
  renderSideList(shown);
  if (kw && shown.length) fitAll();
}

function renderSideList(list) {
  document.getElementById('side-header').textContent = '목록 (' + list.length + ')';
  var sl = document.getElementById('side-list');
  sl.innerHTML = '';
  list.forEach(function(e) {
    var isDone = !!doneSet[e.idx];
    var d = document.createElement('div');
    d.className = 'side-item' + (isDone ? ' done' : '');
    var noteEl = e.station.note ? '<div class="si-note">📝 ' + e.station.note + '</div>' : '';
    d.innerHTML =
      '<div class="si-check">' + (isDone ? '✅' : '⬜') + '</div>' +
      '<div class="si-text">' +
        '<div class="si-name' + (isDone ? ' done' : '') + '">' + e.station.name + '</div>' +
        '<div class="si-addr">' + e.station.origAddr + '</div>' +
        noteEl +
      '</div>';
    d.onclick = function() { map.setView([e.station.lat, e.station.lng], 17); e.marker.openPopup(); };
    sl.appendChild(d);
  });
}
renderSideList(markers);
</script>
