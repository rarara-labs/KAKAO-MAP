<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>무선국 위치 지도</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif; background:#f5f5f5; min-height:100vh; }
    #header {
      background: linear-gradient(135deg,#1a237e,#283593);
      color:white; padding:24px;
      text-align:center;
      box-shadow:0 3px 10px rgba(0,0,0,0.25);
    }
    #header .icon { font-size:40px; margin-bottom:8px; }
    #header h1 { font-size:22px; font-weight:bold; letter-spacing:-0.3px; }
    #header p { font-size:13px; opacity:0.7; margin-top:4px; }
    #list {
      max-width:480px; margin:20px auto; padding:0 16px;
      display:flex; flex-direction:column; gap:10px;
    }
    .week-card {
      background:white; border-radius:12px;
      padding:16px 18px;
      display:flex; align-items:center; gap:14px;
      text-decoration:none; color:inherit;
      box-shadow:0 1px 6px rgba(0,0,0,0.07);
      transition:transform 0.15s, box-shadow 0.15s;
    }
    .week-card:hover { transform:translateY(-2px); box-shadow:0 4px 14px rgba(0,0,0,0.12); }
    .week-icon { font-size:26px; }
    .week-name { flex:1; font-size:16px; font-weight:bold; }
    .week-arrow { font-size:16px; opacity:0.6; }
  </style>
</head>
<body>
<div id="header">
  <div class="icon">📡</div>
  <h1>무선국 위치 지도</h1>
  <p>항목을 선택하세요</p>
</div>
<div id="list">
      <a href="./6월2주_무선국.html" class="week-card" style="border-left:4px solid #3949ab;">
        <div class="week-icon">📡</div>
        <div class="week-name" style="color:#3949ab;">6월2주 무선국</div>
        <div class="week-arrow" style="color:#3949ab;">→</div>
      </a>
      <a href="./재난망_6월1주.html" class="week-card" style="border-left:4px solid #00897b;">
        <div class="week-icon">🚨</div>
        <div class="week-name" style="color:#00897b;">재난망 6월1주</div>
        <div class="week-arrow" style="color:#00897b;">→</div>
      </a>
      <a href="./전자파_전자파측정.html" class="week-card" style="border-left:4px solid #7b1fa2;">
        <div class="week-icon">📻</div>
        <div class="week-name" style="color:#7b1fa2;">전자파 전자파측정</div>
        <div class="week-arrow" style="color:#7b1fa2;">→</div>
      </a>
</div>
</body>
</html>
